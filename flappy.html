<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            
        }
        canvas {
            display: block;
            margin: auto;
            background: #cceeff;;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = {
            x: 50,
            y: 250,
            size: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -8
        };

        //obsticeles
        let pipes = [];
        let pipeWidth = 60;
        let gap = 150;
        let frame = 0;
        let gameOver = false;

        //jump with space
        document.addEventListener("keydown", function(e) {
            if (e.code === "Space") {
                player.velocity = player.jump;
            }
        });

        //Jump with touch on phone
        document.addEventListener("touchstart", function(e) {
            e.preventDefault();
            player.velocity = player.jump;
        });

        function drawPlayer() {
            ctx.fillStyle = "red";
            ctx.fillRect(player.x,  player.y, player.size, player.size);
        }

        function drawPipes() {
            ctx.fillStyle = "green";
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.fillRect(pipe.x, pipe.top + gap, pipeWidth, canvas.height);
            });
        }

        function updatePipes() {
            if (frame % 90 === 0) {
                let topHeight = Math.random() * 300 + 50;
                pipes.push({
                    x: canvas.width,
                    top: topHeight
                });
            }
            pipes.forEach(pipe => {
                pipe.x -= 2;
            });
        }

        function checkCollision() {
            for (let pipe of pipes) {
                if (
                    player.x < pipe.x + pipeWidth &&
                    player.x + player.size > pipe.x &&
                    (player.y < pipe.top || 
                     player.y + player.size > pipe.top + gap)
                ) {
                    gameOver = true;
                }
            }

            if (player.y + player.size > canvas.height || player.y < 0) {
                gameOver = true;
            }
        }

        function update() {
            if (gameOver) {
                ctx.fillStyle = "black";
                ctx.font = "40px Arial";
                ctx.fillText("Game Over", 100, 300);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.velocity += player.gravity;
            player.y += player.velocity;

            updatePipes();
            checkCollision();

            drawPlayer();
            drawPipes();

            frame++;
            requestAnimationFrame(update);
        }

        update();
    </script>
    
</body>
</html>
